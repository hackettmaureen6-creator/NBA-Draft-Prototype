// ── PICK TYPE ────────────────────────────────────────────────────────────────
function getPickType(pick,teamAbbr){
  if(pick.currentHolder!==teamAbbr) return 'obligation';
  if(pick.swapCondition)            return 'swap';
  if(pick.protection)               return 'protected';
  if(pick.condition){
    const n=(pick.notes||'').toUpperCase();
    if(n.includes('LESS FAVORABLE')||n.includes('LEAST FAVORABLE')) return 'less-favorable';
    return 'more-favorable';
  }
  if(pick.originalTeam!==teamAbbr) return 'incoming';
  return 'own';
}

// ── STEPIEN RULE ──────────────────────────────────────────────────────────────
// Returns { lockedYears, violationYears, tradedAwayYears }
// lockedYears: team retains own 1st but cannot trade it (adjacent year already traded)
// violationYears: consecutive traded-away years in data (should not exist; flags data anomaly)
function getStepienStatus(teamAbbr,allPicks){
  // Own 1sts traded away (exclude swap-rights — those aren't outright trades)
  const tradedAway=allPicks.filter(p=>
    p.round==='1st'&&p.originalTeam===teamAbbr&&p.currentHolder!==teamAbbr&&!p.swapCondition
  );
  const tradedAwayYears=new Set(tradedAway.map(p=>p.year));
  // Own 1sts still retained
  const ownRetained=allPicks.filter(p=>
    p.round==='1st'&&p.originalTeam===teamAbbr&&p.currentHolder===teamAbbr&&!p.swapCondition
  );
  // Locked: retained pick whose adjacent year has been traded away
  const lockedYears=new Set();
  ownRetained.forEach(p=>{
    if(tradedAwayYears.has(p.year-1)||tradedAwayYears.has(p.year+1)) lockedYears.add(p.year);
  });
  // Violations: consecutive years both traded away (data anomaly)
  const violationYears=new Set();
  const sortedTraded=Array.from(tradedAwayYears).sort(function(a,b){return a-b;});
  for(let i=0;i<sortedTraded.length-1;i++){
    if(sortedTraded[i+1]-sortedTraded[i]===1){
      violationYears.add(sortedTraded[i]);violationYears.add(sortedTraded[i+1]);
    }
  }
  return {lockedYears,violationYears,tradedAwayYears};
}

function enrichPick(jsonPick){
  const key=`${jsonPick.year}-${jsonPick.round}-${jsonPick.originalTeam}`;

    ?lockedByYear.join(' and ')
    :[pick.year-1,pick.year+1].join(' or ');
  return <div onClick={function(e){e.stopPropagation();}} style={{
    position:'fixed',top:pos.top,left:pos.left,zIndex:1000,
    background:'#001a1f',border:'1.5px solid #00cfff',

// ── YEAR PILLS ────────────────────────────────────────────────────────────────
function YearPills({years,selected,onChange,holdings,primary}){
  const byYear={};
  holdings.forEach(p=>{
    if(!byYear[p.year]) byYear[p.year]={total:0,cond:0};
    byYear[p.year].total++;
    if(p.protection||p.swapCondition||p.condition) byYear[p.year].cond++;
  });
  return <div style={{marginBottom:16,flexShrink:0}}>
    {/* Timeline dots */}
    <div style={{display:'flex',alignItems:'center',paddingLeft:6,paddingRight:6,marginBottom:6}}>
      {years.map((y,i)=>{
        const info=byYear[y]||{total:0,cond:0};
        const active=selected===y;
        const dotColor=active?primary:info.cond>0?'#f0a500':'#252535';
        return <React.Fragment key={y}>
          {i>0&&<div style={{flex:1,height:1,background:'#1e1e2e',minWidth:8}}/>}
          <div style={{width:9,height:9,borderRadius:'50%',background:dotColor,flexShrink:0,
            boxShadow:active?`0 0 6px ${primary}`:'none'}}/>
        </React.Fragment>;
      })}
    </div>
    {/* Pills row */}
    <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
      {years.map(y=>{
        const info=byYear[y]||{total:0,cond:0};
        const active=selected===y;
        const hasCond=info.cond>0&&!active;
        return <div key={y} className="year-pill" onClick={()=>onChange(active?null:y)} style={{
          background:active?primary:'#13131f',
          border:`2px solid ${active?primary:hasCond?'#f0a50066':'#252535'}`,
          borderRadius:10,padding:'8px 16px',minWidth:88,textAlign:'center',
          flexShrink:0,userSelect:'none',
        }}>
          <div style={{fontSize:18,fontWeight:900,color:active?'#fff':'#e8e8f8',lineHeight:1}}>{y}</div>
          <div style={{fontSize:10,color:active?'rgba(255,255,255,.75)':'#aaa',marginTop:3}}>
            {info.total} pick{info.total!==1?'s':''}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── PICKS GRID ────────────────────────────────────────────────────────────────
function PicksGrid({picks,teamAbbr,selectedKey,onPickClick,allHoldings,stepienStatus,autoLinked}){
  const ss=stepienStatus||{lockedYears:new Set(),violationYears:new Set(),tradedAwayYears:new Set()};
  // Global P-IDs: 1st round holdings first, then 2nd, across all years
  const allFirst=allHoldings.filter(p=>p.round==='1st');
  const allSecond=allHoldings.filter(p=>p.round==='2nd');
  const ordered=[...allFirst,...allSecond];
  const pidMap=new Map(ordered.map((p,i)=>[p,`P${String(i+1).padStart(3,'0')}`]));

  // condition → all P-IDs sharing that condition
  const condPids={};
  ordered.forEach(p=>{
    if(p.condition){
      if(!condPids[p.condition]) condPids[p.condition]=[];
      condPids[p.condition].push(pidMap.get(p));
    }
  });

  const first=picks.filter(p=>p.round==='1st');
  const second=picks.filter(p=>p.round==='2nd');
  if(picks.length===0) return <div style={{padding:'30px 0',color:'#777',fontSize:12,textAlign:'center'}}>
    No picks for this year
  </div>;

  // Find currently selected pick object for linked highlight
  const selPick=allHoldings.find((p,i)=>{
    const k=`${p.year}-${p.round}-${p.originalTeam}-${p.currentHolder}-${ordered.indexOf(p)}`;
    return k===selectedKey;
  })||allHoldings.find(p=>pidMap.get(p)===selectedKey?.split('|')[1]);

  const Section=({title,sectionPicks,bullet,bulletColor})=>{
    if(!sectionPicks.length) return null;
    const isFirstRound=title==='1ST ROUND';
    const stepienCount=isFirstRound
      ?sectionPicks.filter(p=>ss.lockedYears.has(p.year)&&p.originalTeam===teamAbbr&&p.currentHolder===teamAbbr).length
      :0;
    return <div style={{marginBottom:24}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:12}}>
        <span style={{color:bulletColor,fontSize:bullet==='◆'?9:12,lineHeight:1}}>{bullet}</span>
        <span style={{fontSize:11,fontWeight:800,color:'#e0e0f0',letterSpacing:1.2,textTransform:'uppercase'}}>{title}</span>
      </div>
      {isFirstRound&&stepienCount>0&&<div style={{
        background:'#001a1f',border:'1.5px solid #00cfff55',borderRadius:8,
        padding:'8px 12px',marginBottom:12,display:'flex',alignItems:'center',gap:8,
      }}>
        <span style={{fontSize:14,flexShrink:0}}>🔒</span>
        <div style={{fontSize:11,lineHeight:1.4}}>
          <span style={{fontWeight:800,color:'#00cfff',letterSpacing:.3}}>STEPIEN RULE APPLIES</span>
          <span style={{color:'#5090a0',marginLeft:6}}>
            — {stepienCount} pick{stepienCount!==1?'s':''} cannot be traded due to consecutive-year restrictions.
          </span>
        </div>
      </div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
        {sectionPicks.map((pick,idx)=>{
          const pickId=pidMap.get(pick)||`P${String(idx+1).padStart(3,'0')}`;
          const key=`${pick.year}-${pick.round}-${pick.originalTeam}-${pick.currentHolder}-${ordered.indexOf(pick)}`;
          const isSel=selectedKey===key;
          const isLinked=autoLinked?!!pick.condition:(!isSel&&selPick&&selPick.condition&&pick.condition===selPick.condition);
          const linkedPids=pick.condition
            ?(condPids[pick.condition]||[]).filter(pid=>pid!==pickId)
            :[];
          const isLocked=ss.lockedYears.has(pick.year)&&pick.originalTeam===teamAbbr&&pick.currentHolder===teamAbbr;
          const lockedByYear=isLocked
            ?[pick.year-1,pick.year+1].filter(function(y){return ss.tradedAwayYears.has(y);})
            :[];
          return <PickCard key={key} pick={pick} teamAbbr={teamAbbr} pickId={pickId}
            isSelected={isSel} isLinked={!!isLinked} linkedPickIds={linkedPids}
            isStepienLocked={isLocked} lockedByYear={lockedByYear}
            onClick={()=>onPickClick(isSel?null:key, isSel?null:pick, isSel?null:pickId)}/>;
        })}
      </div>
    </div>;
  };

  return <div style={{animation:'fadeUp 0.2s ease'}}>
    <Section title="1ST ROUND" sectionPicks={first} bullet="◆" bulletColor="#CE1141"/>
    <Section title="2ND ROUND" sectionPicks={second} bullet="○" bulletColor="#888"/>
  </div>;
}

function TimelineView({holdings,teamAbbr}){

function LotterySimulator({activeTeam,tc,holdings,houFinish,setHouFinish,okcFinish,setOkcFinish}){
  const [teamFinish,setTeamFinish]=useState(5);
  const isHOU=activeTeam==='HOU';
  const isOKC=activeTeam==='OKC';
  const isHouOkc=isHOU||isOKC;
  const finish=isHOU?houFinish:isOKC?okcFinish:teamFinish;
  const setFinish=isHOU?setHouFinish:isOKC?setOkcFinish:setTeamFinish;
  const conveys=houFinish>4;

  // Find any protected picks this team holds (incoming or own)
  const protectedPicks=holdings.filter(p=>p.protection);

  return <div style={{animation:'fadeUp 0.2s ease',maxWidth:600}}>
    <div style={{fontSize:12,color:'#cc66ff',marginBottom:14,textTransform:'uppercase',letterSpacing:1,fontWeight:800}}>
      🎰 Lottery Simulator — 2026 Draft
    </div>

    {/* Active team slider — always shown */}
    <SimSlider finish={finish} setFinish={setFinish} color={tc.primary} teamName={tc.name}/>

    {/* Protected picks resolution for this team */}
    {protectedPicks.length>0&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,color:'#999',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>
        PROTECTED PICK RESOLUTIONS
      </div>
      {protectedPicks.map((pick,i)=>{
        const pid=pick._id||`P${String(i+1).padStart(3,'0')}`;
        const origCfg=TEAM_CFG[pick.originalTeam]||{primary:'#888'};
        // Parse protection threshold from text like "Top-4 protected" or "Top-8 Protected"
        const match=(pick.protection||'').match(/top-?(\d+)/i);
        const threshold=match?parseInt(match[1]):null;
        const withinProt=threshold?finish<=threshold:null;
        return <div key={pid} style={{background:'#0f0f1e',
          border:`2px solid ${withinProt===null?'#252535':withinProt?'#2ecc71':'#f0a500'}`,
          borderRadius:10,padding:14,marginBottom:8,transition:'border-color 0.3s'}}>
          <div style={{fontSize:11,color:'#aaa',fontWeight:700,marginBottom:6}}>
            {pid} — <span style={{color:origCfg.primary}}>{pick.originalTeam}</span> {pick.year} {pick.round}
            <span style={{fontSize:10,color:'#f0a500',marginLeft:8}}>{pick.protection}</span>
          </div>
          {withinProt===null
            ?<div style={{fontSize:11,color:'#888'}}>Adjust finish to see resolution</div>
            :withinProt
              ?<div style={{fontSize:12,fontWeight:800,color:'#2ecc71'}}>
                  ✅ Finish #{finish} — within protection. Pick stays / does not convey.
                </div>
              :<div style={{fontSize:12,fontWeight:800,color:'#f0a500'}}>
                  ⚡ Finish #{finish} — outside protection threshold. Pick likely conveys.
                </div>
          }
        </div>;
      })}
    </div>}

    {/* HOU/OKC specific pool resolution */}
    {isHouOkc&&<>
      <div style={{fontSize:11,color:'#999',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>
        PICK POOL RESOLUTIONS
      </div>

      {/* HOU slider (show alongside OKC if viewing OKC) */}
      {isOKC&&<SimSlider finish={houFinish} setFinish={setHouFinish} color="#CE1141" teamName="Houston Rockets"/>}

      {/* P001 pool */}
      <div style={{background:'#0f0f1e',border:`2px solid ${conveys?'#f0a500':'#2ecc71'}`,
        borderRadius:10,padding:14,marginBottom:10,transition:'border-color 0.3s'}}>
        <div style={{fontSize:11,color:'#999',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
          P001 — HOU 2026 1st · OKC/LAC/HOU Pool Resolution
        </div>
        {conveys?<>
          <div style={{fontSize:12,color:'#f0a500',fontWeight:800,marginBottom:10}}>
            ⚡ HOU finishes #{houFinish} → exits top-4 → CONVEYS into pool
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {[['🥇','BEST → OKC','#007AC1','Most favorable of OKC/LAC/HOU pool'],
              ['🥈','2nd → PHI','#4a9eff','via McCain trade 02/05/2026'],
              ['🥉','WORST → WAS','#E31837','Washington Wizards'],
            ].map(([icon,label,color,sub])=><div key={label} style={{display:'flex',alignItems:'center',gap:10,
              padding:'8px 12px',background:`${color}18`,borderRadius:8,border:`1px solid ${color}44`}}>
              <span style={{fontSize:16}}>{icon}</span>
              <div>
                <div style={{fontSize:11,fontWeight:800,color}}>{label}</div>
                <div style={{fontSize:11,color:'#999'}}>{sub}</div>
              </div>
            </div>)}
          </div>
        </>:<div style={{fontSize:12,color:'#2ecc71',fontWeight:800}}>
          ✅ HOU finishes #{houFinish} (top-4 protected) → HOU KEEPS the pick. Pool does not activate.
        </div>}
      </div>

      {/* P021 UTA */}
      <div style={{background:'#0f0f1e',border:'1px solid #252535',borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
          P021 — UTA 2026 1st (Top-8 Protected) → OKC
        </div>
        <div style={{fontSize:12,fontWeight:800,color:okcFinish<=8?'#f0a500':'#2ecc71'}}>
          {okcFinish<=8
            ?`⚡ OKC proxy #${okcFinish} → UTA likely top-8 → pick may NOT convey (obligation extinguishes)`
            :`✅ If UTA finishes outside top-8 → pick conveys to OKC`}
        </div>
        <div style={{fontSize:11,color:'#777',marginTop:5}}>OKC finish used as proxy — verify UTA's actual standing on RealGM</div>
      </div>
    </>}

    {protectedPicks.length===0&&!isHouOkc&&<div style={{background:'#0f0f1e',border:'1px solid #1e1e2e',
      borderRadius:10,padding:16,textAlign:'center',color:'#555',fontSize:12}}>
      No protected picks tracked for this team yet.<br/>
      <span style={{fontSize:11,color:'#444'}}>Lottery odds above reflect a hypothetical finish position.</span>
    </div>}

    <div style={{fontSize:11,color:'#777',fontStyle:'italic',lineHeight:1.6,marginTop:8}}>
      Covers 2026 draft · Positions approximate · Always verify on RealGM for official resolution
    </div>
  </div>;
}

        ?<div style={{marginTop:14,marginBottom:4,display:'flex',alignItems:'center',justifyContent:'center',gap:10,flexWrap:'wrap'}}>
            <div style={{fontSize:11,color:'#c0c0d8',fontWeight:700,letterSpacing:.8}}>
              {{cards:'📋 CARDS',timeline:'📅 TIMELINE',simulator:'🎰 SIMULATOR',linked:'🔗 LINKED PICKS'}[pendingView]} selected —
              <span style={{color:'#fff',marginLeft:5}}>now pick a team to open it</span>
            </div>
            <button onClick={()=>setPendingView(null)} style={{
              background:'none',border:'1px solid #333',color:'#666',borderRadius:5,
              padding:'2px 8px',fontSize:10,cursor:'pointer'}}>✕ clear</button>
          </div>
        :<div style={{fontSize:11,color:'#ffffff',fontWeight:800,letterSpacing:2,textTransform:'uppercase',
            textAlign:'center',marginTop:16,marginBottom:4,
            textShadow:'0 0 8px rgba(255,255,255,0.5),1px 1px 2px #000'}}>SELECT A TEAM</div>
      }
    </div>

    {/* Team grid */}
    <div className="team-grid" style={{padding:'0 24px 40px',display:'grid',
      gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,maxWidth:900,
      margin:'0 auto',width:'100%'}}>
      {ALL_TEAMS.map(abbr=>{
        const cfg=TEAM_CFG[abbr]||{primary:'#888',secondary:'#444',name:abbr,short:abbr};
        const isAvail=availSet.has(abbr);
        const sec=cfg.secondary||cfg.primary;
        return <div key={abbr}
          className={['team-card-inner',isAvail?'team-card-sel':'',isAvail?'team-card-live':'',isAvail?'team-card-grad':''].join(' ')}
          onClick={isAvail?()=>onSelect(abbr,pendingView||'cards'):undefined}
          style={{
            background:isAvail?undefined:'#0b0b15',
            border:isAvail?undefined:'2px solid #181828',
            borderRadius:18,padding:'20px 12px 16px',textAlign:'center',
            opacity:isAvail?1:.16,
            cursor:isAvail?'pointer':'default',
            position:'relative',overflow:'hidden',
            '--card-bg':isAvail?(cfg.bg||cfg.primary+'55'):'#0b0b15',
            '--tc-primary':cfg.primary,
            '--tc-secondary':sec,
            '--glow-a':`${cfg.primary}88`,
            '--glow-b':`${cfg.primary}44`,
            '--glow-c':`${cfg.primary}22`,
          }}>
          {/* Animated gradient top bar */}
          {isAvail&&<div className="gradient-bar" style={{
            position:'absolute',top:0,left:0,right:0,height:4,borderRadius:'18px 18px 0 0',
            '--g1':cfg.primary,'--g2':sec,
          }}/>}
          {/* Team logo */}
          <div style={{display:'flex',justifyContent:'center',marginBottom:8,marginTop:isAvail?4:0}}>
            <img src={logoUrl(abbr)} alt={abbr} width={52} height={52} className="team-logo-img"
              style={{objectFit:'contain',
                transform:'scale(1.2)',
                filter:isAvail?(abbr==='TOR'?'brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.8))':'drop-shadow(0 0 10px '+cfg.primary+'aa)'):'grayscale(1) opacity(0.15)',
                transition:'filter 0.2s,transform 0.2s'}}
              onError={e=>{e.currentTarget.style.display='none';}}
            />
          </div>
          <div style={{fontSize:22,fontWeight:700,color:'#fff',
            letterSpacing:.5,lineHeight:1,textShadow:'0 0 4px rgba(255,255,255,0.3)'}}>{abbr}</div>
          <div style={{fontSize:12,color:isAvail?'#e8e8ff':'#1e1e2e',marginTop:4,
            fontWeight:600,letterSpacing:.3,lineHeight:1.3,
            textShadow:isAvail?'0 0 4px rgba(255,255,255,0.3)':'none'}}>{cfg.short||cfg.name}</div>
          {isAvail&&<div className="view-picks-label" style={{marginTop:8,fontSize:10,color:cfg.primary,fontWeight:800,
            letterSpacing:.8}}>VIEW PICKS →</div>}
        </div>;
      })}
    </div>

    {/* Footer note */}
    <div style={{textAlign:'center',padding:'0 20px 28px',fontSize:11,color:'#555',flexShrink:0}}>
      All 30 teams available · Data current through 2026 NBA Trade Deadline · Verify with RealGM
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [activeTeam,setActiveTeam]=useState(null);
  const [activeYear,setActiveYear]=useState(null);
  const [activeView,setActiveView]=useState('cards');
  const [selectedKey,setSelectedKey]=useState(null);
  const [selectedPick,setSelectedPick]=useState(null);
  const [selectedPickId,setSelectedPickId]=useState(null);
  const [houFinish,setHouFinish]=useState(5);
  const [okcFinish,setOkcFinish]=useState(6);

  const load=useCallback(()=>{
    setLoading(true);setError(null);
    fetch('all_teams_draft_picks.json')
      .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();})
      .then(d=>{setData(d);setLoading(false);})
      .catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  useEffect(()=>{load();},[load]);

  const teamPicks=useMemo(()=>data&&activeTeam?(data.teams[activeTeam]?.picks||[]):[],[data,activeTeam]);
  // Enrich picks with detail text and linked IDs from ALL_PICKS
  const enrichedPicks=useMemo(()=>teamPicks.map(enrichPick),[teamPicks]);
  const holdings=useMemo(()=>enrichedPicks.filter(p=>p.currentHolder===activeTeam),[enrichedPicks,activeTeam]);
  const years=useMemo(()=>[...new Set(holdings.map(p=>p.year))].sort(),[holdings]);
  const filtered=useMemo(()=>activeYear?holdings.filter(p=>p.year===activeYear):holdings,[holdings,activeYear]);
  const stats=useMemo(()=>({
    first:holdings.filter(p=>p.round==='1st').length,
    second:holdings.filter(p=>p.round==='2nd').length,
    cond:holdings.filter(p=>p.protection||p.swapCondition||p.condition).length,
  }),[holdings]);

  const stepienStatus=useMemo(()=>
    activeTeam?getStepienStatus(activeTeam,enrichedPicks):{lockedYears:new Set(),violationYears:new Set(),tradedAwayYears:new Set()},
    [activeTeam,enrichedPicks]
  );
  const available=useMemo(()=>data?Object.keys(data.teams):[],[data]);
  const tc=activeTeam?(TEAM_CFG[activeTeam]||{name:activeTeam,short:activeTeam,primary:'#888',secondary:'#444'}):null;
  const yearRange=years.length?`${years[0]}–${years[years.length-1]}`:'';
  const hasSimulator=activeTeam==='HOU'||activeTeam==='OKC';

  const handlePick=useCallback((key,pick,pid)=>{
    setSelectedKey(key);setSelectedPick(pick||null);setSelectedPickId(pid||null);
  },[]);

  const switchTeam=useCallback((t,view='cards')=>{
    setActiveTeam(t);setActiveYear(null);setSelectedKey(null);setSelectedPick(null);setSelectedPickId(null);
    setActiveView(view||'cards');
    window.scrollTo(0,0);
  },[]);

  const goHome=useCallback(()=>{
    setActiveTeam(null);setActiveYear(null);setSelectedKey(null);setSelectedPick(null);setSelectedPickId(null);
  },[]);

  if(loading) return <div style={{display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',flex:1,gap:14}}>
    <div style={{width:36,height:36,border:'3px solid #1a1a2e',borderTop:'3px solid #CE1141',
      borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
    <div style={{color:'#999',fontSize:12}}>Loading draft capital data…</div>
  </div>;

  if(error) return <div style={{display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',flex:1,gap:10,padding:20,textAlign:'center'}}>
    <div style={{fontSize:14,color:'#f87171',fontWeight:700}}>Failed to load data</div>
    <div style={{fontSize:11,color:'#999',maxWidth:300}}>{error}</div>
    <button onClick={load} style={{background:'#1e1e2e',border:'1px solid #333',color:'#ccc',
      borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:11,marginTop:4}}>Try Again</button>
  </div>;

  // ── LANDING SCREEN ──
  if(!activeTeam) return <TeamSelector available={available} onSelect={switchTeam}/>;

  // ── TEAM VIEW ──
  return <div className="team-screen">
    {/* ── HEADER ── */}
    <div style={{padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',
      borderBottom:'1px solid #14142a',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <button onClick={goHome} style={{background:'#111',border:'1px solid #252535',
          color:'#aaa',borderRadius:7,padding:'6px 12px',cursor:'pointer',fontSize:11,
          fontWeight:700,letterSpacing:.3,display:'flex',alignItems:'center',gap:5,
          transition:'all 0.12s ease'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#444';e.currentTarget.style.color='#fff';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#252535';e.currentTarget.style.color='#aaa';}}>
          ← ALL TEAMS
        </button>
        <div>
          <div className="header-app-title" style={{fontSize:20,fontWeight:900,letterSpacing:1,color:'#fff',lineHeight:1}}>
            NBA DRAFT CAPITAL EXPLORER
          </div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,marginTop:4,color:tc.primary}}>
            {tc.name.toUpperCase()} · {yearRange}
          </div>
        </div>
      </div>
      <div className="header-stats" style={{display:'flex',gap:8}}>
        {[{v:stats.first,l:'1ST ROUND',c:tc.primary},{v:stats.second,l:'2ND ROUND',c:'#e0e0e0'},
          {v:stats.cond,l:'CONDITIONAL',c:'#f0a500'}].map(s=>
          <div key={s.l} style={{background:'#111',border:`1px solid ${s.c}33`,borderRadius:8,
            padding:'8px 14px',textAlign:'center',minWidth:72}}>
            <div style={{fontSize:24,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:10,color:'#c8c8dc',marginTop:3,letterSpacing:.3}}>{s.l}</div>
          </div>
        )}
      </div>
    </div>

    {/* ── TEAM ROW ── */}
    <div className="team-row-scroll" style={{padding:'8px 20px',borderBottom:'1px solid #0d0d1a',display:'flex',
      alignItems:'center',gap:8,flexWrap:'nowrap',background:'#0c0c14',flexShrink:0,overflowX:'auto'}}>
      <span style={{fontSize:10,color:'#c0c0d8',fontWeight:700,letterSpacing:.5,marginRight:2}}>TEAM:</span>
      {available.map(t=>{
        const tcb=TEAM_CFG[t]||{primary:'#888',short:t};
        const isActive=t===activeTeam;
        return <button key={t} className="team-btn" onClick={()=>switchTeam(t)} style={{
          background:isActive?tcb.primary:'transparent',
          border:`1.5px solid ${isActive?tcb.primary:'#2a2a3a'}`,
          color:isActive?'#fff':'#c0c0d8',borderRadius:6,padding:'5px 12px',
          fontSize:11,fontWeight:800,letterSpacing:.3,display:'flex',alignItems:'center',gap:5,
        }}>
          <span>{t}</span>
          <span style={{opacity:.7,fontWeight:400,fontSize:10}}>{tcb.short}</span>
        </button>;
      })}
      <span style={{fontSize:10,color:'#aaa',marginLeft:4}}>🔗 Shared picks shown across teams</span>
    </div>

    {/* ── VIEW TABS ── */}
    <div style={{padding:'8px 20px',borderBottom:'1px solid #0d0d1a',display:'flex',
      gap:6,background:'#0a0a12',flexShrink:0}}>
      {['cards','timeline','simulator','linked'].map(id=>{
        const cfg={cards:{icon:'📋',label:'Cards'},timeline:{icon:'📅',label:'Timeline'},simulator:{icon:'🎰',label:'Simulator'},linked:{icon:'🔗',label:'Linked'}}[id];
        const isActive=activeView===id;
        return <button key={id} className={['view-tab',isActive?'view-tab-active':''].join(' ')} onClick={()=>setActiveView(id)} style={{
          background:isActive?tc.primary:'transparent',
          border:`1.5px solid ${isActive?tc.primary:'#252535'}`,
          color:isActive?'#fff':'#d0d0e8',borderRadius:6,padding:'5px 14px',
          fontSize:11,fontWeight:700,letterSpacing:.3,
          '--tab-glow':isActive?tc.primary+'99':'transparent',
        }}>{cfg.icon} {cfg.label}</button>;
      })}
    </div>

    {/* ── MAIN ── */}
    {activeView==='cards'&&<div className="two-panel" style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
      {/* Left: picks */}
      <div className="panel-picks" style={{flex:'0 0 58%',padding:'16px 20px',overflowY:'auto',borderRight:'1px solid #0d0d1a'}}>
        <YearPills years={years} selected={activeYear} onChange={setActiveYear}
          holdings={holdings} primary={tc.primary}/>
        <PicksGrid picks={filtered} teamAbbr={activeTeam} selectedKey={selectedKey}
          onPickClick={handlePick} allHoldings={holdings} stepienStatus={stepienStatus}/>
      </div>
      {/* Right: detail */}
      <div className="panel-detail" style={{flex:'0 0 42%',padding:'16px 20px',overflowY:'auto',background:'#0c0c14'}}>
        {selectedPick
          ?<DetailPanel pick={selectedPick} teamAbbr={activeTeam} pickId={selectedPickId}
              allTeamPicks={holdings} houFinish={houFinish} okcFinish={okcFinish}
              isStepienLocked={!!(selectedPick&&stepienStatus.lockedYears.has(selectedPick.year)&&selectedPick.originalTeam===activeTeam&&selectedPick.currentHolder===activeTeam)}
              lockedByYear={selectedPick&&stepienStatus.lockedYears.has(selectedPick.year)&&selectedPick.originalTeam===activeTeam&&selectedPick.currentHolder===activeTeam?[selectedPick.year-1,selectedPick.year+1].filter(function(y){return stepienStatus.tradedAwayYears.has(y);}):[]}
              onClose={()=>handlePick(null,null,null)}
              onLinkedClick={(lp)=>{
                const allFirst=holdings.filter(p=>p.round==='1st');
                const allSecond=holdings.filter(p=>p.round==='2nd');
                const ordered=[...allFirst,...allSecond];
                const idx=ordered.indexOf(lp);
                const pid=lp._id||`P${String(idx+1).padStart(3,'0')}`;
                const key=`${lp.year}-${lp.round}-${lp.originalTeam}-${lp.currentHolder}-${idx}`;
                handlePick(key,lp,pid);
              }}/>
          :<DetailPlaceholder/>}
      </div>
    </div>}

    {activeView==='timeline'&&<div style={{flex:1,padding:'20px',overflowY:'auto'}}>
      <TimelineView holdings={holdings} teamAbbr={activeTeam}/>
    </div>}

    {activeView==='simulator'&&<div style={{flex:1,padding:'20px',overflowY:'auto'}}>
      <LotterySimulator activeTeam={activeTeam} tc={tc} holdings={holdings}
        houFinish={houFinish} setHouFinish={setHouFinish}
        okcFinish={okcFinish} setOkcFinish={setOkcFinish}/>
    </div>}

    {activeView==='linked'&&<div className="two-panel" style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
      <div className="panel-picks" style={{flex:'0 0 58%',padding:'16px 20px',overflowY:'auto',borderRight:'1px solid #0d0d1a'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
          <span style={{fontSize:11}}>🔗</span>
          <span className="linked-note" style={{fontSize:11,letterSpacing:.4,color:'#00ffcc',textShadow:'0 0 8px rgba(0,255,204,0.7)',background:'none',fontWeight:700}}>🔒 LINKED CARDS</span>
        </div>
        <YearPills years={years} selected={activeYear} onChange={setActiveYear}
          holdings={holdings} primary={tc.primary}/>
        <PicksGrid picks={filtered.filter(p=>p.condition)} teamAbbr={activeTeam} selectedKey={selectedKey}
          onPickClick={handlePick} allHoldings={holdings} stepienStatus={stepienStatus} autoLinked={true}/>
        {filtered.filter(p=>p.condition).length===0&&<div style={{color:'#555',fontSize:13,marginTop:24,textAlign:'center'}}>
          No pool or swap picks held by {activeTeam} {activeYear?'in '+activeYear:'across any year'}.
        </div>}
      </div>
      <div className="panel-detail" style={{flex:'0 0 42%',padding:'16px 20px',overflowY:'auto',background:'#0c0c14'}}>
        {selectedPick
          ?<DetailPanel pick={selectedPick} teamAbbr={activeTeam} pickId={selectedPickId}
              allTeamPicks={holdings} houFinish={houFinish} okcFinish={okcFinish}
              isStepienLocked={!!(selectedPick&&stepienStatus.lockedYears.has(selectedPick.year)&&selectedPick.originalTeam===activeTeam&&selectedPick.currentHolder===activeTeam)}
              lockedByYear={selectedPick&&stepienStatus.lockedYears.has(selectedPick.year)&&selectedPick.originalTeam===activeTeam&&selectedPick.currentHolder===activeTeam?[selectedPick.year-1,selectedPick.year+1].filter(function(y){return stepienStatus.tradedAwayYears.has(y);}):[]}
              onClose={()=>handlePick(null,null,null)}
              onLinkedClick={(lp)=>{
                const allFirst=holdings.filter(p=>p.round==='1st');
                const allSecond=holdings.filter(p=>p.round==='2nd');
                const ordered=[...allFirst,...allSecond];
                const idx=ordered.indexOf(lp);
                const pid=lp._id||'P'+String(idx+1).padStart(3,'0');
                const key=lp.year+'-'+lp.round+'-'+lp.originalTeam+'-'+lp.currentHolder+'-'+idx;
                handlePick(key,lp,pid);
              }}/>
          :<DetailPlaceholder/>}
      </div>
    </div>}

    <LegendBar/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
